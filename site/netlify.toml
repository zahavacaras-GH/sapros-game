[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/images/*"
  [headers.values]
    # Short cache + must-revalidate so updated images appear on next page load.
    # If you ever optimize for perf later, switch to hashed filenames + immutable.
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
